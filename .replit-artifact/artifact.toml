kind = "web"
previewPath = "/"
title = "AreaFada OS"
version = "1.0.0"
id = "artifacts/areafadaos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22997

[services.development]
run = "pnpm --filter @workspace/areafadaos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/areafadaos", "run", "build" ]
publicDir = "web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22997"
BASE_PATH = "/"
